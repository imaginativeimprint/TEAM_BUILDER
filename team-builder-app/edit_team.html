<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Team - Team Builder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <h1 class="page-title">Edit Team</h1>
        
        <div class="form-container">
            <div class="secret-verification" id="secretVerification">
                <h3>Enter Secret Key to Edit</h3>
                <div class="form-group">
                    <label for="verifySecret">Secret Key:</label>
                    <input type="password" id="verifySecret" placeholder="Enter secret key">
                    <button onclick="verifyTeamSecret()" class="btn btn-primary">Verify</button>
                </div>
            </div>

            <div id="editForm" style="display: none;">
                <form id="editTeamForm">
                    <input type="hidden" id="editTeamId">
                    
                    <div class="form-group">
                        <label for="editTeamName">Team Name:</label>
                        <input type="text" id="editTeamName" required>
                    </div>

                    <div class="team-members-section">
                        <h3>Edit Team Members</h3>
                        <div id="editMembersContainer"></div>
                        <button type="button" onclick="addEditMemberField()" class="btn btn-secondary">+ Add Member</button>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">Update Team</button>
                        <a href="view_teams.html" class="btn btn-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
