<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Team - Team Builder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <h1 class="page-title">Create New Team</h1>
        
        <div class="form-container">
            <form id="createTeamForm">
                <div class="form-group">
                    <label for="teamName">Team Name:</label>
                    <input type="text" id="teamName" name="teamName" required placeholder="Enter team name">
                </div>

                <div class="form-group">
                    <label for="secretKey">Secret Key:</label>
                    <input type="password" id="secretKey" name="secretKey" required placeholder="Enter secret key for editing">
                </div>

                <div class="team-members-section">
                    <h3>Add Team Members (3-4 members required)</h3>
                    
                    <div id="members-container">
                        <!-- Member entry fields will be added here dynamically -->
                    </div>

                    <div class="member-count" id="memberCount">Members: 0/4 (Minimum 3 required)</div>
                    
                    <button type="button" id="addMemberBtn" class="btn btn-secondary">+ Add Member</button>
                </div>

                <div class="team-preview" id="teamPreview">
                    <h3>Team Preview</h3>
                    <table id="previewTable">
                        <thead>
                            <tr>
                                <th>USN</th>
                                <th>Name</th>
                            </tr>
                        </thead>
                        <tbody id="previewBody"></tbody>
                    </table>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary" id="submitTeam">Create Team</button>
                    <a href="index.html" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
